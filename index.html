<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube Thumbnail Powerscaling</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap");

        :root {
            --bg: #f8f8f1;
            --panel: #ffffff;
            --line: #d9d9c8;
            --text: #1c1c1c;
            --muted: #66664f;
            --left: #ffe082;
            --right: #80deea;
            --danger: #ffcdd2;
            --winner: #c5e1a5;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Comic Sans MS", "Comic Neue", "Chalkboard SE", "Trebuchet MS", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 10% 10%, #fff9c4, transparent 35%),
                radial-gradient(circle at 90% 8%, #b3e5fc, transparent 30%),
                var(--bg);
            padding: 16px;
        }

        .wrap {
            width: min(1100px, 100%);
            margin: 0 auto;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.9rem, 4.8vw, 2.8rem);
            line-height: 1;
        }

        .subtitle {
            margin-top: 8px;
            color: var(--muted);
        }

        .board {
            margin-top: 14px;
            display: grid;
            grid-template-columns: 1.7fr 1fr;
            gap: 12px;
        }

        .filters-bar {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 140px;
        }

        .filter-label {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .filter-select {
            border-radius: 8px;
            border: 1px solid var(--line);
            background: #fffef8;
            color: var(--text);
            padding: 6px 8px;
            font-size: 0.9rem;
            font-family: inherit;
        }

        .panel {
            border: 2px dashed var(--line);
            background: var(--panel);
            border-radius: 12px;
            padding: 12px;
        }

        .versus {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: stretch;
            gap: 10px;
        }

        .video-card {
            display: flex;
            flex-direction: column;
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
            background: #fffef8;
        }

        .video-frame {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: 0;
            display: block;
            background: #000;
        }

        .video-info {
            padding: 10px;
        }

        .video-title {
            margin: 0 0 8px;
            font-size: 1rem;
        }

        .video-meta {
            margin: 0;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .video-link {
            color: #005f8f;
            text-decoration: underline;
            font-size: 0.84rem;
            word-break: break-all;
        }

        .choose-btn {
            margin-top: 8px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 10px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            color: #222;
            background: var(--left);
        }

        .choose-btn.right {
            background: var(--right);
        }

        .vs-pill {
            align-self: center;
            border: 1px solid var(--line);
            color: var(--muted);
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.95rem;
            background: #fffef8;
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .control-btn {
            border: 1px solid var(--line);
            color: var(--text);
            background: #fffef8;
            border-radius: 8px;
            padding: 7px 10px;
            font-family: inherit;
            cursor: pointer;
        }

        .control-btn.reset {
            background: var(--danger);
        }

        .stats-title {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1.5rem;
        }

        .leader-item,
        .match-item {
            display: grid;
            gap: 4px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 8px;
            background: #fffef8;
        }

        .leader-item {
            grid-template-columns: auto 1fr auto;
            align-items: center;
        }

        .rank {
            color: var(--muted);
            font-weight: 700;
            min-width: 24px;
        }

        .power {
            color: #2e7d32;
            font-weight: 700;
            background: var(--winner);
            border-radius: 999px;
            padding: 2px 8px;
        }

        .match-item small {
            color: var(--muted);
        }

        .empty {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .status {
            border: 1px dashed var(--line);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            color: var(--muted);
            background: #fffef8;
        }

        @media (max-width: 960px) {
            .board {
                grid-template-columns: 1fr;
            }

            .versus {
                grid-template-columns: 1fr;
            }

            .vs-pill {
                justify-self: center;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>YOUTUBE THUMBNAIL POWERSCALING</h1>
        <p class="subtitle">Choose the most auraful thumbnail. Winner goes up by +1 on the rankings. enjoy ^-^</p>

            <div class="filter-group">

                <select id="likesFilter" class="filter-select">
                    <option value="any">Any</option>
                    <option value="liked">Mostly liked</option>
                    <option value="mixed">Mixed</option>
                    <option value="controversial">Controversial</option>
                </select>
            </div>
        </div>

        <div class="board">
            <section class="panel">
                <div class="versus" id="versusArea"></div>
                <div class="controls">
                    <button class="control-btn" id="skipBtn" type="button">Skip Matchup</button>
                </div>
            </section>

            <section class="panel">
                <h2 class="stats-title">Leaderboard</h2>
                <div id="leaderboard"></div>
            </section>
        </div>

        <section class="panel" style="margin-top: 16px;">
            <h2 class="stats-title">Bracket Feed</h2>
            <div id="bracketFeed"></div>
        </section>
    </div>

    <script src="config.js"></script>
    <script>
        window.__POWERSCALING_CONFIG__ = {
            // Safe default for this deployment; config.js can still override it.
            apiBase: "https://yt-powerscaling-api.youtubepowerscaling.workers.dev",
            allowLocalFallback: true,
            ...(window.__POWERSCALING_CONFIG__ || {})
        };
    </script>

        const MAX_FEED_ITEMS = 24;
        const MAX_MATCH_HISTORY = 250;

        const MIN_POOL_BEFORE_FETCH = 30;

        const HAS_REMOTE_API = REMOTE_API_BASE.length > 0;

        const ALLOW_LOCAL_FALLBACK = RUNTIME_CONFIG.allowLocalFallback !== false;

        ];

            { id: "kJQP7kiw5Fk", category: "fallback" }, { id: "9bZkp7q19f0", category: "fallback" }, { id: "L_jWHffIx5E", category: "fallback" },

            { id: "aqz-KE-bpKQ", category: "fallback" }, { id: "lXMskKTw3Bc", category: "fallback" }, { id: "UiLSiqyDf4Y", category: "fallback" },
            { id: "D8V0wQ0W4d4", category: "fallback" }, { id: "gA6ppby3JC8", category: "fallback" }, { id: "u9Mv98Gr5pY", category: "fallback" },

            { id: "sTSA_sWGM44", category: "fallback" }, { id: "sNPnbI1arSE", category: "fallback" }, { id: "5NV6Rdv1a3I", category: "fallback" },
            { id: "bM7SZ5SBzyY", category: "fallback" }, { id: "hTWKbfoikeg", category: "fallback" },
            { id: "04854XqcfCY", category: "fallback" }, { id: "QH2-TGulWu4", category: "fallback" }, { id: "LsoLEjrDogU", category: "fallback" },
            { id: "2vjPBrBU-TM", category: "fallback" }, { id: "fRh_vgS2dFE", category: "fallback" }, { id: "YqeW9_5kURI", category: "fallback" }
        ];

        const versusArea = document.getElementById("versusArea");
        const leaderboardEl = document.getElementById("leaderboard");
        const bracketFeedEl = document.getElementById("bracketFeed");
        const skipBtn = document.getElementById("skipBtn");
        const subtitleEl = document.querySelector(".subtitle");

        const genreFilterEl = document.getElementById("genreFilter");
        const viewsFilterEl = document.getElementById("viewsFilter");
        const languageFilterEl = document.getElementById("languageFilter");
        const ageFilterEl = document.getElementById("ageFilter");
        const likesFilterEl = document.getElementById("likesFilter");

        const EMPTY_STATE = { videosById: {}, powers: {}, matches: [], usedIds: [] };

        let state = { ...EMPTY_STATE };
        let currentPair = null;
        let isLoadingPair = false;
        let lastLoadError = "";
        let candidateQueue = [];
        let seenThisRun = new Set();
        const metadataCache = new Map();

        const activeFilters = {
            genre: "any",
            views: "any",
            language: "any",
            age: "any",
            likes: "any"
        };

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function randomFrom(items) {
            return items[Math.floor(Math.random() * items.length)];
        }

        function syntheticMetaForId(id) {
            let sum = 0;
            for (let i = 0; i < id.length; i += 1) {
                sum += id.charCodeAt(i);
            }

            const genres = ["music", "gaming", "education", "documentary", "meme", "other"];
            const viewBuckets = ["lt100k", "100k_1m", "1m_10m", "gt10m"];
            const languages = ["en", "non_en"];
            const ageBuckets = ["lt1y", "1_5y", "5_10y", "gt10y"];
            const likeBuckets = ["liked", "mixed", "controversial"];

            return {
                genre: genres[sum % genres.length],
                viewBucket: viewBuckets[sum % viewBuckets.length],
                language: languages[sum % languages.length],
                ageBucket: ageBuckets[sum % ageBuckets.length],
                likeDislikeSentiment: likeBuckets[sum % likeBuckets.length]
            };
        }

        function matchesFilters(video) {
            if (!video) {
                return false;
            }

            // Genre (uses explicit genre when present, otherwise category as a fallback)
            if (activeFilters.genre !== "any") {
                const vGenre = (video.genre || video.category || "other").toLowerCase();
                if (vGenre !== activeFilters.genre) {
                    return false;
                }
            }

            // The following filters require real stats (views, language, age, likes).
            // In file:// offline mode we can't query YouTube APIs, so they are
            // treated as "Any" regardless of the dropdown settings.
            if (HAS_METADATA_API) {
                // View count buckets (string bucket, e.g. "1m_10m")
                if (activeFilters.views !== "any") {
                    const bucket = video.viewBucket || null;
                    if (!bucket || bucket !== activeFilters.views) {
                        return false;
                    }
                }

                // Language (expects language code like "en" or "non_en")
                if (activeFilters.language !== "any") {
                    const lang = (video.language || "").toLowerCase();
                    if (!lang) {
                        return false;
                    }
                    const isEnglish = lang.startsWith("en");
                    if (activeFilters.language === "en" && !isEnglish) return false;
                    if (activeFilters.language === "non_en" && isEnglish) return false;
                }

                // Age buckets (string bucket, e.g. "5_10y")
                if (activeFilters.age !== "any") {
                    const bucket = video.ageBucket || null;
                    if (!bucket || bucket !== activeFilters.age) {
                        return false;
                    }
                }

                // Likes/dislikes sentiment (expects likeDislikeSentiment string when available)
                if (activeFilters.likes !== "any") {
                    if (!video.likeDislikeSentiment || video.likeDislikeSentiment !== activeFilters.likes) {
                        return false;
                    }
                }
            }

            return true;
        }

        function normalizeState(parsed) {
            return {
                videosById: parsed && parsed.videosById && typeof parsed.videosById === "object" ? parsed.videosById : {},
                powers: parsed && parsed.powers && typeof parsed.powers === "object" ? parsed.powers : {},
                matches: parsed && Array.isArray(parsed.matches) ? parsed.matches : [],
                usedIds: parsed && Array.isArray(parsed.usedIds) ? parsed.usedIds : []
            };
        }

        function apiUrl(path) {
            return HAS_REMOTE_API ? `${REMOTE_API_BASE}${path}` : path;
        }

        function loadLocalState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) {
                    return { ...EMPTY_STATE };
                }
                return normalizeState(JSON.parse(raw));
            } catch {
                return { ...EMPTY_STATE };
            }
        }

        function saveLocalState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        async function loadState() {
            const localState = loadLocalState();

            if (REQUIRE_REMOTE_ON_GH_PAGES && !ALLOW_LOCAL_FALLBACK) {
                return { ...EMPTY_STATE };
            }

            if (IS_FILE_MODE) {
                return localState;
            }

            try {
                const response = await fetch(apiUrl("/api/state"), { cache: "no-store" });
                if (!response.ok) {
                    return localState;
                }
                const payload = await response.json();
                const normalized = normalizeState(payload);
                normalized.usedIds = [];
                return normalized;
            } catch {
                if (REQUIRE_REMOTE_ON_GH_PAGES && !ALLOW_LOCAL_FALLBACK) {
                    return { ...EMPTY_STATE };
                }
                return localState;
            }
        }

        async function saveState() {
            if (IS_FILE_MODE) {
                saveLocalState();
                return;
            }

            try {
                const response = await fetch(apiUrl("/api/state"), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        videosById: state.videosById,
                        powers: state.powers,
                        matches: state.matches,
                        usedIds: []
                    })
                });
                if (!response.ok) {
                    throw new Error("remote-state-save-failed");
                }
            } catch {
                if (REQUIRE_REMOTE_ON_GH_PAGES && !ALLOW_LOCAL_FALLBACK) {
                    throw new Error("remote-state-required");
                }
                // Keep app interactive if persistence endpoint is unavailable.
                saveLocalState();
            }
        }

        function rememberUsedId(videoId) {
            if (!videoId) {
                return;
            }
            if (!Array.isArray(state.usedIds)) {
                state.usedIds = [];
            }
            if (state.usedIds.includes(videoId)) {
                return;
            }
            state.usedIds.push(videoId);
            if (state.usedIds.length > MAX_USED_IDS) {
                state.usedIds = state.usedIds.slice(-MAX_USED_IDS);
            }
        }

        function buildUsedIdSet() {
            const persisted = Array.isArray(state.usedIds) ? state.usedIds : [];
            return new Set([...persisted, ...seenThisRun]);
        }

        function registerVideo(video) {
            const existing = state.videosById[video.id] || {};
            state.videosById[video.id] = {
                id: video.id,
                title: video.title || existing.title || `YouTube Video ${video.id}`,
                channel: video.channel || existing.channel || "Unknown channel",
                category: video.category || existing.category || "misc",
                url: video.url || `https://www.youtube.com/watch?v=${video.id}`,
                genre: video.genre || existing.genre,
                viewBucket: video.viewBucket || existing.viewBucket,
                language: video.language || existing.language,
                ageBucket: video.ageBucket || existing.ageBucket,
                likeDislikeSentiment: video.likeDislikeSentiment || existing.likeDislikeSentiment
            };
            if (typeof state.powers[video.id] !== "number") {
                state.powers[video.id] = 0;
            }
        }

        async function hydrateVideoMetadata(video) {
            if (!video || !video.id) {
                return video;
            }

            // In local file mode, skip external metadata fetches entirely to avoid
            // long stalls or timeouts behind VPNs/proxies. Just register with
            // whatever basic info we already have.
            if (!HAS_METADATA_API) {
                registerVideo(video);
                return state.videosById[video.id];
            }

            const cached = metadataCache.get(video.id);
            if (cached) {
                const mergedFromCache = {
                    ...video,
                    title: cached.title || video.title,
                    channel: cached.channel || video.channel
                };
                registerVideo(mergedFromCache);
                return state.videosById[video.id];
            }

            try {
                const endpoint = apiUrl(`/api/video-meta?id=${encodeURIComponent(video.id)}`);
                const response = await fetch(endpoint, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error("metadata-unavailable");
                }
                const payload = await response.json();

                const merged = {
                    ...video,
                    title: payload && payload.title ? payload.title : video.title,
                    channel: payload && payload.channel ? payload.channel : video.channel,
                    url: (payload && payload.url) || `https://www.youtube.com/watch?v=${video.id}`,
                    genre: payload && payload.genre ? payload.genre : video.genre,
                    viewBucket: payload && payload.viewBucket ? payload.viewBucket : video.viewBucket,
                    language: payload && payload.language ? payload.language : video.language,
                    ageBucket: payload && payload.ageBucket ? payload.ageBucket : video.ageBucket,
                    likeDislikeSentiment: payload && payload.likeDislikeSentiment ? payload.likeDislikeSentiment : video.likeDislikeSentiment
                };

                metadataCache.set(video.id, {
                    title: merged.title,
                    channel: merged.channel
                });

                registerVideo(merged);
                return state.videosById[video.id];
            } catch {
                registerVideo(video);
                return state.videosById[video.id];
            }
        }

        function allKnownVideos() {
            return Object.values(state.videosById);
        }

        function extractYoutubeId(rawUrl) {
            if (!rawUrl || typeof rawUrl !== "string") {
                return null;
            }

            let parsed;
            try {
                parsed = new URL(rawUrl);
            } catch {
                return null;
            }

            const host = parsed.hostname.replace(/^www\./, "").toLowerCase();
            if (host === "youtu.be") {
                const shortId = parsed.pathname.replace(/^\//, "").split("/")[0];
                return shortId || null;
            }

            if (host.endsWith("youtube.com")) {
                if (parsed.pathname === "/watch") {
                    return parsed.searchParams.get("v");
                }
                const parts = parsed.pathname.split("/").filter(Boolean);
                if (parts[0] === "shorts" || parts[0] === "embed") {
                    return parts[1] || null;
                }
            }

            return null;
        }

        async function fetchRedditBatch() {
            const subreddit = randomFrom(REDDIT_SOURCES);
            const listing = randomFrom(REDDIT_LISTINGS);
            const topWindow = randomFrom(["day", "week", "month", "year", "all"]);
            const endpoint = listing === "top"
                ? `https://www.reddit.com/r/${subreddit}/${listing}.json?limit=100&t=${topWindow}&raw_json=1`
                : `https://www.reddit.com/r/${subreddit}/${listing}.json?limit=100&raw_json=1`;

            const response = await fetch(endpoint, { cache: "no-store" });
            if (!response.ok) {
                throw new Error("reddit-failed");
            }

            const json = await response.json();
            const children = json && json.data && Array.isArray(json.data.children) ? json.data.children : [];
            const results = [];

            for (const child of children) {
                const post = child && child.data ? child.data : null;
                if (!post) {
                    continue;
                }
                const rawUrl = post.url_overridden_by_dest || post.url;
                const id = extractYoutubeId(rawUrl);
                if (!id) {
                    continue;
                }
                results.push({
                    id,
                    title: post.title || `YouTube Video ${id}`,
                    channel: post.author || `r/${subreddit}`,
                    category: subreddit,
                    url: `https://www.youtube.com/watch?v=${id}`
                });
            }

            return results;
        }

        function buildRandomQuery() {
            return `${randomFrom(QUERY_MODIFIERS)} ${randomFrom(QUERY_TOPICS)}`;
        }

        async function fetchInvidiousBatch() {
            const instance = randomFrom(INVIDIOUS_INSTANCES);
            const query = buildRandomQuery();
            const sortBy = randomFrom(["relevance", "upload_date", "view_count", "rating"]);
            const page = 1 + Math.floor(Math.random() * 4);
            const endpoint = `${instance}/api/v1/search?q=${encodeURIComponent(query)}&type=video&sort_by=${sortBy}&page=${page}`;

            const response = await fetch(endpoint, { cache: "no-store" });
            if (!response.ok) {
                throw new Error("search-failed");
            }

            const json = await response.json();
            if (!Array.isArray(json)) {
                return [];
            }

            const results = [];
            for (const item of json) {
                if (!item || !item.videoId) {
                    continue;
                }
                results.push({
                    id: item.videoId,
                    title: item.title || `YouTube Video ${item.videoId}`,
                    channel: item.author || "Unknown",
                    category: "search-random",
                    url: `https://www.youtube.com/watch?v=${item.videoId}`
                });
            }
            return results;
        }

        async function fetchRemoteBatch() {
            if (!HAS_REMOTE_API) {
                return [];
            }

            const endpoint = apiUrl(`/api/random-videos?limit=${MIN_POOL_BEFORE_FETCH * 2}`);
            const response = await fetch(endpoint, { cache: "no-store" });
            if (!response.ok) {
                throw new Error("remote-random-failed");
            }

            const payload = await response.json();
            if (!payload || !Array.isArray(payload.videos)) {
                return [];
            }

            return payload.videos
                .filter((video) => video && video.id)
                .map((video) => ({
                    id: String(video.id),
                    title: video.title || `YouTube Video ${video.id}`,
                    channel: video.channel || "Unknown",
                    category: video.category || "youtube-random",
                    url: video.url || `https://www.youtube.com/watch?v=${video.id}`,
                    genre: video.genre,
                    viewBucket: video.viewBucket,
                    language: video.language,
                    ageBucket: video.ageBucket,
                    likeDislikeSentiment: video.likeDislikeSentiment
                }));
        }

        async function fetchRemotePair(excludedSet = new Set(), filters = activeFilters) {
            if (!HAS_REMOTE_API) {
                return null;
            }

            const params = new URLSearchParams({
                genre: filters.genre || "any",
                views: filters.views || "any",
                language: filters.language || "any",
                age: filters.age || "any",
                likes: filters.likes || "any"
            });

            const excluded = Array.from(excludedSet).slice(-350);
            if (excluded.length > 0) {
                params.set("excluded", excluded.join(","));
            }

            const endpoint = apiUrl(`/api/random-pair?${params.toString()}`);
            const response = await fetch(endpoint, { cache: "no-store" });
            if (!response.ok) {
                const body = await response.text().catch(() => "");
                throw new Error(`remote-pair-failed:${response.status}:${body.slice(0, 160)}`);
            }

            const payload = await response.json();
            if (!payload || !Array.isArray(payload.pair) || payload.pair.length < 2) {
                throw new Error("remote-pair-invalid");
            }

            return payload.pair;
        }

        async function refillCandidateQueueIfNeeded() {
            if (candidateQueue.length >= MIN_POOL_BEFORE_FETCH) {
                return true;
            }

            if (!HAS_METADATA_API) {
                const usedIds = buildUsedIdSet();
                const queueIds = new Set(candidateQueue.map((video) => video.id));

                for (const seed of FALLBACK_VIDEOS) {
                    if (queueIds.has(seed.id) || usedIds.has(seed.id)) {
                        continue;
                    }
                    const meta = syntheticMetaForId(seed.id);
                    candidateQueue.push({
                        id: seed.id,
                        title: `YouTube Video ${seed.id}`,
                        channel: "Offline pool",
                        category: seed.category,
                        url: `https://www.youtube.com/watch?v=${seed.id}`,
                        ...meta
                    });
                    queueIds.add(seed.id);
                }

                // Shuffle to keep matchups unpredictable in local-only mode.
                for (let i = candidateQueue.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    const tmp = candidateQueue[i];
                    candidateQueue[i] = candidateQueue[j];
                    candidateQueue[j] = tmp;
                }

                return candidateQueue.length > 0;
            }

            const seenQueueIds = new Set(candidateQueue.map((video) => video.id));
            const usedIds = buildUsedIdSet();

            const addBatch = (batch) => {
                for (const video of batch) {
                    if (!seenQueueIds.has(video.id) && !usedIds.has(video.id)) {
                        candidateQueue.push(video);
                        seenQueueIds.add(video.id);
                    }
                }
            };

            let addedAny = false;

            if (HAS_REMOTE_API) {
                try {
                    const remoteBatch = await fetchRemoteBatch();
                    addBatch(remoteBatch);
                    if (remoteBatch.length > 0) {
                        addedAny = true;
                    }
                } catch {
                    // Continue to browser sources as secondary fallback.
                }

                if (candidateQueue.length >= MIN_POOL_BEFORE_FETCH) {
                    return true;
                }
            }

            try {
                const reddit = await fetchRedditBatch();
                addBatch(reddit);
                if (reddit.length > 0) {
                    addedAny = true;
                }
            } catch {
                // Continue to other sources.
            }

            try {
                const invidious = await fetchInvidiousBatch();
                addBatch(invidious);
                if (invidious.length > 0) {
                    addedAny = true;
                }
            } catch {
                // Fallback will handle total failure.
            }

            return addedAny || candidateQueue.length > 0;
        }

        async function getNextUnseenVideo(excluded = new Set()) {
            const usedSet = buildUsedIdSet();
            while (candidateQueue.length > 0) {
                const next = candidateQueue.shift();
                if (!next || excluded.has(next.id) || usedSet.has(next.id)) {
                    continue;
                }

                const hydrated = await hydrateVideoMetadata(next);
                if (!matchesFilters(hydrated)) {
                    continue;
                }

                registerVideo(hydrated);
                return hydrated;
            }
            return null;
        }

        async function useFallbackPair() {
            if (HAS_REMOTE_API) {
                return null;
            }

            for (const video of FALLBACK_VIDEOS) {
                const meta = syntheticMetaForId(video.id);
                registerVideo({
                    id: video.id,
                    title: `YouTube Video ${video.id}`,
                    channel: "Offline pool",
                    category: video.category,
                    url: `https://www.youtube.com/watch?v=${video.id}`,
                    ...meta
                });
            }

            const known = allKnownVideos();
            if (known.length < 2) {
                return null;
            }

            const usedSet = buildUsedIdSet();
            let usable = known.filter((video) => !usedSet.has(video.id) && matchesFilters(video));
            if (usable.length < 2) {
                // Start a new full pass after exhausting known pool.
                seenThisRun = new Set();
                state.usedIds = [];
                usable = known.filter((video) => matchesFilters(video));
            }

            const left = usable[Math.floor(Math.random() * usable.length)];
            const rightPool = usable.filter((video) => video.id !== left.id);
            const right = rightPool[Math.floor(Math.random() * rightPool.length)];

            const hydrated = await Promise.all([hydrateVideoMetadata(left), hydrateVideoMetadata(right)]);
            rememberUsedId(hydrated[0] && hydrated[0].id);
            rememberUsedId(hydrated[1] && hydrated[1].id);
            return hydrated;
        }

        async function useForcedFallbackPair() {
            const originalHasRemote = HAS_REMOTE_API;
            if (!originalHasRemote) {
                return await useFallbackPair();
            }

            for (const video of FALLBACK_VIDEOS) {
                const meta = syntheticMetaForId(video.id);
                registerVideo({
                    id: video.id,
                    title: `YouTube Video ${video.id}`,
                    channel: "Offline pool",
                    category: video.category,
                    url: `https://www.youtube.com/watch?v=${video.id}`,
                    ...meta
                });
            }

            const known = allKnownVideos();
            const usedSet = buildUsedIdSet();
            let usable = known.filter((video) => !usedSet.has(video.id));
            if (usable.length < 2) {
                seenThisRun = new Set();
                state.usedIds = [];
                usable = known;
            }
            if (usable.length < 2) {
                return null;
            }

            const left = usable[Math.floor(Math.random() * usable.length)];
            const rightPool = usable.filter((video) => video.id !== left.id);
            const right = rightPool[Math.floor(Math.random() * rightPool.length)];

            const hydrated = await Promise.all([hydrateVideoMetadata(left), hydrateVideoMetadata(right)]);
            rememberUsedId(hydrated[0] && hydrated[0].id);
            rememberUsedId(hydrated[1] && hydrated[1].id);
            return hydrated;
        }

        async function buildFreshPair() {
            if (HAS_REMOTE_API) {
                const excluded = buildUsedIdSet();
                for (let attempt = 0; attempt < FETCH_ATTEMPTS_PER_PAIR; attempt += 1) {
                    try {
                        const pair = await fetchRemotePair(excluded, activeFilters);
                        const leftRaw = pair[0];
                        const rightRaw = pair[1];

                        if (!leftRaw || !rightRaw || !leftRaw.id || !rightRaw.id || leftRaw.id === rightRaw.id) {
                            continue;
                        }

                        registerVideo(leftRaw);
                        registerVideo(rightRaw);

                        const left = state.videosById[leftRaw.id];
                        const right = state.videosById[rightRaw.id];

                        seenThisRun.add(left.id);
                        seenThisRun.add(right.id);
                        rememberUsedId(left.id);
                        rememberUsedId(right.id);
                        lastLoadError = "";
                        return [left, right];
                    } catch (err) {
                        lastLoadError = String(err && err.message ? err.message : err);
                        // Retry with a fresh remote query.
                    }
                }

                const relaxedFilters = {
                    genre: activeFilters.genre,
                    views: "any",
                    language: "any",
                    age: "any",
                    likes: "any"
                };

                for (let attempt = 0; attempt < 4; attempt += 1) {
                    try {
                        const pair = await fetchRemotePair(excluded, relaxedFilters);
                        const leftRaw = pair[0];
                        const rightRaw = pair[1];

                        if (!leftRaw || !rightRaw || !leftRaw.id || !rightRaw.id || leftRaw.id === rightRaw.id) {
                            continue;
                        }

                        registerVideo(leftRaw);
                        registerVideo(rightRaw);

                        const left = state.videosById[leftRaw.id];
                        const right = state.videosById[rightRaw.id];

                        seenThisRun.add(left.id);
                        seenThisRun.add(right.id);
                        rememberUsedId(left.id);
                        rememberUsedId(right.id);
                        lastLoadError = "";
                        return [left, right];
                    } catch (err) {
                        lastLoadError = String(err && err.message ? err.message : err);
                        // Continue trying relaxed remote pulls.
                    }
                }

                try {
                    const remoteBatch = await fetchRemoteBatch();
                    if (remoteBatch.length >= 2) {
                        const pool = remoteBatch.filter((video) => !excluded.has(video.id));
                        const usable = pool.length >= 2 ? pool : remoteBatch;
                        const left = usable[Math.floor(Math.random() * usable.length)];
                        const rightPool = usable.filter((video) => video.id !== left.id);
                        const right = rightPool[Math.floor(Math.random() * rightPool.length)];
                        if (left && right) {
                            registerVideo(left);
                            registerVideo(right);
                            seenThisRun.add(left.id);
                            seenThisRun.add(right.id);
                            rememberUsedId(left.id);
                            rememberUsedId(right.id);
                            lastLoadError = "";
                            return [state.videosById[left.id], state.videosById[right.id]];
                        }
                    }
                } catch (err) {
                    lastLoadError = String(err && err.message ? err.message : err);
                }

                const forced = await useForcedFallbackPair();
                if (forced) {
                    lastLoadError = "";
                    return forced;
                }

                return null;
            }

            for (let attempt = 0; attempt < FETCH_ATTEMPTS_PER_PAIR; attempt += 1) {
                await refillCandidateQueueIfNeeded();

                const left = await getNextUnseenVideo();
                if (!left) {
                    continue;
                }

                const right = await getNextUnseenVideo(new Set([left.id]));
                if (!right) {
                    continue;
                }

                const hydratedPair = await Promise.all([hydrateVideoMetadata(left), hydrateVideoMetadata(right)]);

                seenThisRun.add(left.id);
                seenThisRun.add(right.id);
                rememberUsedId(left.id);
                rememberUsedId(right.id);
                return hydratedPair;
            }

            seenThisRun = new Set();
            await refillCandidateQueueIfNeeded();

            const left = await getNextUnseenVideo();
            const right = await getNextUnseenVideo(left ? new Set([left.id]) : new Set());
            if (left && right) {
                const hydratedPair = await Promise.all([hydrateVideoMetadata(left), hydrateVideoMetadata(right)]);
                seenThisRun.add(left.id);
                seenThisRun.add(right.id);
                rememberUsedId(left.id);
                rememberUsedId(right.id);
                return hydratedPair;
            }

            return await useFallbackPair();
        }

        function renderMatchup() {
            if (isLoadingPair) {
                versusArea.innerHTML = !HAS_METADATA_API
                    ? '<div class="status">Picking two fresh videos from the pool...</div>'
                    : '<div class="status">Fetching two new random YouTube videos...</div>';
                return;
            }

            if (!currentPair) {
                const errText = lastLoadError ? `<br><small>${escapeHtml(lastLoadError)}</small>` : "";
                versusArea.innerHTML = `<div class="status">Could not load new videos. Click Skip Matchup to retry.${errText}</div>`;
                return;
            }

            const left = currentPair[0];
            const right = currentPair[1];

            const leftSourceLabel = !HAS_METADATA_API && (left.channel === "Offline pool" || left.category === "fallback")
                ? "Offline pool"
                : (left.channel || "Unknown channel");
            const rightSourceLabel = !HAS_METADATA_API && (right.channel === "Offline pool" || right.category === "fallback")
                ? "Offline pool"
                : (right.channel || "Unknown channel");
            const leftCategoryLabel = !HAS_METADATA_API && left.category === "fallback" ? "offline" : (left.category || "misc");
            const rightCategoryLabel = !HAS_METADATA_API && right.category === "fallback" ? "offline" : (right.category || "misc");

            versusArea.innerHTML = `
                <article class="video-card">
                    <iframe
                        class="video-frame"
                        src="https://www.youtube.com/embed/${left.id}?rel=0"
                        title="${escapeHtml(left.title)}"
                        loading="lazy"
                        referrerpolicy="strict-origin-when-cross-origin"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen>
                    </iframe>
                    <div class="video-info">
                        <h3 class="video-title">${escapeHtml(left.title)}</h3>
                        <p class="video-meta">${escapeHtml(leftSourceLabel)} | ${escapeHtml(leftCategoryLabel)} | Power: ${state.powers[left.id] || 0}</p>
                        <a class="video-link" href="${escapeHtml(left.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(left.url)}</a>
                        <button class="choose-btn" data-win-id="${left.id}" data-lose-id="${right.id}" type="button">
                            Left Wins
                        </button>
                    </div>
                </article>
                <span class="vs-pill">VS</span>
                <article class="video-card">
                    <iframe
                        class="video-frame"
                        src="https://www.youtube.com/embed/${right.id}?rel=0"
                        title="${escapeHtml(right.title)}"
                        loading="lazy"
                        referrerpolicy="strict-origin-when-cross-origin"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen>
                    </iframe>
                    <div class="video-info">
                        <h3 class="video-title">${escapeHtml(right.title)}</h3>
                        <p class="video-meta">${escapeHtml(rightSourceLabel)} | ${escapeHtml(rightCategoryLabel)} | Power: ${state.powers[right.id] || 0}</p>
                        <a class="video-link" href="${escapeHtml(right.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(right.url)}</a>
                        <button class="choose-btn right" data-win-id="${right.id}" data-lose-id="${left.id}" type="button">
                            Right Wins
                        </button>
                    </div>
                </article>
            `;
        }

        function renderLeaderboard() {
            const known = allKnownVideos();
            if (known.length === 0) {
                leaderboardEl.innerHTML = '<p class="empty">No ranked videos yet.</p>';
                return;
            }

            const sorted = [...known].sort((a, b) => {
                const powerDiff = (state.powers[b.id] || 0) - (state.powers[a.id] || 0);
                if (powerDiff !== 0) {
                    return powerDiff;
                }
                return a.title.localeCompare(b.title);
            });

            leaderboardEl.innerHTML = sorted.map((video, idx) => `
                <div class="leader-item">
                    <span class="rank">#${idx + 1}</span>
                    <span>${escapeHtml(video.title)}</span>
                    <span class="power">${state.powers[video.id] || 0} power</span>
                </div>
            `).join("");
        }

        function renderBracketFeed() {
            if (state.matches.length === 0) {
                bracketFeedEl.innerHTML = '<p class="empty">No matches yet. Start powerscaling above.</p>';
                return;
            }

            const visible = [...state.matches].reverse().slice(0, MAX_FEED_ITEMS);
            bracketFeedEl.innerHTML = visible.map((match) => `
                <div class="match-item">
                    <div><strong>${escapeHtml(match.winnerTitle)}</strong> defeated ${escapeHtml(match.loserTitle)}</div>
                    <small>+1 power to winner (${match.winnerPowerAfter} total)</small>
                </div>
            `).join("");
        }

        function paint() {
            renderMatchup();
            renderLeaderboard();
            renderBracketFeed();
        }

        async function queueNextMatchup() {
            isLoadingPair = true;
            skipBtn.disabled = true;
            renderMatchup();

            try {
                currentPair = await buildFreshPair();
            } catch (err) {
                lastLoadError = String(err && err.message ? err.message : err);
                currentPair = await useFallbackPair();
            } finally {
                isLoadingPair = false;
                skipBtn.disabled = false;
                paint();
            }
        }

        async function recordWin(winnerId, loserId) {
            state.powers[winnerId] = (state.powers[winnerId] || 0) + 1;
            const winner = state.videosById[winnerId];
            const loser = state.videosById[loserId];

            state.matches.push({
                winnerId,
                loserId,
                winnerTitle: winner ? winner.title : winnerId,
                loserTitle: loser ? loser.title : loserId,
                winnerPowerAfter: state.powers[winnerId],
                happenedAt: Date.now()
            });

            if (state.matches.length > MAX_MATCH_HISTORY) {
                state.matches = state.matches.slice(-MAX_MATCH_HISTORY);
            }

            try {
                await saveState();
            } catch {
                // Keep gameplay moving even if persistence is temporarily unavailable.
            }
            await queueNextMatchup();
        }

        function handleFilterChange() {
            activeFilters.genre = genreFilterEl ? genreFilterEl.value : "any";
            activeFilters.views = viewsFilterEl ? viewsFilterEl.value : "any";
            activeFilters.language = languageFilterEl ? languageFilterEl.value : "any";
            activeFilters.age = ageFilterEl ? ageFilterEl.value : "any";
            activeFilters.likes = likesFilterEl ? likesFilterEl.value : "any";

            // Reset current queue so new matchups respect the updated filters.
            candidateQueue = [];
            seenThisRun = new Set();

            if (!isLoadingPair) {
                queueNextMatchup();
            }
        }

        versusArea.addEventListener("click", async (event) => {
            const button = event.target.closest("button[data-win-id]");
            if (!button || isLoadingPair) {
                return;
            }

            await recordWin(button.dataset.winId, button.dataset.loseId);
        });

        skipBtn.addEventListener("click", async () => {
            if (isLoadingPair) {
                return;
            }
            await queueNextMatchup();
        });

        if (genreFilterEl) genreFilterEl.addEventListener("change", handleFilterChange);
        if (viewsFilterEl) viewsFilterEl.addEventListener("change", handleFilterChange);
        if (languageFilterEl) languageFilterEl.addEventListener("change", handleFilterChange);
        if (ageFilterEl) ageFilterEl.addEventListener("change", handleFilterChange);
        if (likesFilterEl) likesFilterEl.addEventListener("change", handleFilterChange);

        // In offline file mode, advanced filters (views/language/age/likes) can't
        // be enforced because the app has no access to real YouTube stats.
        // Keep the UI visible but make it clear they effectively behave as "Any".
        if (!HAS_METADATA_API) {
            if (viewsFilterEl) viewsFilterEl.title = "View filters require online stats; in file mode they behave as Any.";
            if (languageFilterEl) languageFilterEl.title = "Language filters require online stats; in file mode they behave as Any.";
            if (ageFilterEl) ageFilterEl.title = "Age filters require online stats; in file mode they behave as Any.";
            if (likesFilterEl) likesFilterEl.title = "Likes/dislikes filters require online stats; in file mode they behave as Any.";
        }

        if (IS_GITHUB_PAGES && !HAS_REMOTE_API && subtitleEl) {
            subtitleEl.textContent = `${subtitleEl.textContent} Configure apiBase in config.js to enable global leaderboard and bracket on GitHub Pages.`;
        }

        async function bootstrap() {
            if (REQUIRE_REMOTE_ON_GH_PAGES && !ALLOW_LOCAL_FALLBACK) {
                versusArea.innerHTML = '<div class="status">Global mode is required. Set apiBase in config.js to your deployed API URL.</div>';
                leaderboardEl.innerHTML = '<p class="empty">Global state unavailable until apiBase is configured.</p>';
                bracketFeedEl.innerHTML = '<p class="empty">Global state unavailable until apiBase is configured.</p>';
                return;
            }

            state = await loadState();
            paint();
            await queueNextMatchup();
        }

        bootstrap();
    </script>
</body>
